services:
  test-data-ui:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # This mounts your whole project (dev mode)
      - sqlite_data:/app/db  # Persist the db file
    environment:
      - DJANGO_SETTINGS_MODULE=tdui.settings
    env_file:
      - .env
    command: gunicorn tdui.wsgi:application --bind 0.0.0.0:8000

volumes:
  sqlite_data: